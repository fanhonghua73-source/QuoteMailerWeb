<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Template Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box }
        body { font-family: 'Segoe UI', Arial; background: #1a1a1a; color: #fff; display: flex; height: 100vh; overflow: hidden }
        .sidebar { width: 300px; background: #252525; overflow-y: auto; padding: 15px; border-right: 1px solid #333 }
        .btn { display: block; width: 100%; padding: 10px 14px; margin-bottom: 4px; background: #333; border: none; border-radius: 5px; color: #bbb; font-size: 12px; text-align: left; cursor: pointer; }
        .btn:hover { background: #444; color: #fff }
        .btn.active { background: #E65100; color: #fff }
        .preview { flex: 1; display: flex; align-items: center; justify-content: center; background: #555 }
        .preview iframe { width: 640px; height: 100%; border: none; background: #fff }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Templates</h2>
        <button class="btn active" onclick="load('templates/theme_01.html',this)">01 Nordic</button>
        <button class="btn" onclick="load('templates/apple_style.html',this)">Apple Cupertino</button>
        <button class="btn" onclick="load('templates/vogue_style.html',this)">Vogue Editorial</button>
        <hr style="border-color:#444;margin:15px 0">
        <h2 style="font-size:12px;color:#888;margin-bottom:10px">Product Showcase</h2>
        <button class="btn" onclick="load('templates/bonbon_template.html',this)">BONBON Storage Box</button>
        <button class="btn" onclick="load('templates/funky_template.html',this)">Funky Retro Hydration</button>
        <button class="btn" onclick="load('templates/combined_template.html',this)">Combined Proposal</button>
    </div>
    <div class="preview">
        <iframe id="f" src="templates/theme_01.html"></iframe>
    </div>
    <script>
    function load(src, btn) {
        var btns = document.querySelectorAll('.btn');
        for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
        btn.classList.add('active');
        document.getElementById('f').src = src;
    }
    </script>
</body>
</html>
