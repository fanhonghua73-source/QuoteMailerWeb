<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteMailer Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <h1 class="text-2xl font-light text-gray-800 tracking-wider">QuoteMailer <span class="text-sm font-normal text-gray-500">Web Edition</span></h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Left Panel: Controls -->
            <div class="space-y-6">
                <!-- File Upload -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-lg font-medium text-gray-800 mb-4">1. 上传报价单</h2>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-gray-400 transition" id="dropzone">
                        <input type="file" id="excelFile" accept=".xlsx,.xls" class="hidden">
                        <label for="excelFile" class="cursor-pointer">
                            <div class="text-4xl mb-2">📄</div>
                            <p class="text-gray-600" id="fileLabel">点击选择 Excel 文件或拖拽至此</p>
                            <p class="text-sm text-gray-400 mt-1" id="fileName"></p>
                        </label>
                    </div>
                </div>

                <!-- Media Config -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-lg font-medium text-gray-800 mb-4">2. 配置内容</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">【主图】动图/图片链接 (选填)</label>
                            <input type="url" id="heroImage" placeholder="https://example.com/hero.gif" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-200 focus:border-gray-400 outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">【视频】完整链接 (选填)</label>
                            <input type="url" id="videoUrl" placeholder="https://youtube.com/..." 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-200 focus:border-gray-400 outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">【专属问候/前言】(选填)</label>
                            <textarea id="greeting" rows="3" placeholder="例如: Hi John, 结合贵司对北欧市场的需求，我特为您企划了以下场景..."
                                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-200 focus:border-gray-400 outline-none resize-none"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-4">
                    <button id="previewBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-medium py-3 px-6 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                        ✨ 生成预览
                    </button>
                    <button id="sendBtn" class="flex-1 bg-white border-2 border-gray-800 text-gray-800 font-medium py-3 px-6 rounded-lg hover:bg-gray-50 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        📧 发送邮件
                    </button>
                </div>

                <!-- Status -->
                <div id="status" class="hidden p-4 rounded-lg"></div>
            </div>

            <!-- Right Panel: Preview -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="bg-gray-100 px-6 py-3 border-b flex justify-between items-center">
                    <h2 class="font-medium text-gray-800">预览效果</h2>
                    <span id="productCount" class="text-sm text-gray-500"></span>
                </div>
                <iframe id="previewFrame" class="w-full h-[600px] border-0" sandbox="allow-same-origin"></iframe>
            </div>
        </div>
    </main>

    <!-- Send Modal -->
    <div id="sendModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 p-6">
            <h3 class="text-lg font-medium text-gray-800 mb-4">发送测试邮件</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">邮件服务</label>
                    <select id="smtpPreset" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="gmail">Gmail</option>
                        <option value="outlook">Outlook</option>
                        <option value="qq">QQ邮箱</option>
                        <option value="163">163邮箱</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">SMTP 服务器</label>
                    <input type="text" id="smtpHost" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">端口</label>
                        <input type="number" id="smtpPort" value="587" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">发件人</label>
                        <input type="text" id="fromName" placeholder="Your Name" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名/邮箱</label>
                    <input type="email" id="smtpUser" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码/授权码</label>
                    <input type="password" id="smtpPass" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">收件人</label>
                    <input type="email" id="toEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button id="confirmSend" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-medium py-2 px-4 rounded-lg transition">
                    确认发送
                </button>
                <button id="cancelSend" class="flex-1 bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg hover:bg-gray-50 transition">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script>
        // State
        let sessionId = null;
        
        // Elements
        const fileInput = document.getElementById('excelFile');
        const fileLabel = document.getElementById('fileLabel');
        const fileName = document.getElementById('fileName');
        const heroImage = document.getElementById('heroImage');
        const videoUrl = document.getElementById('videoUrl');
        const greeting = document.getElementById('greeting');
        const previewBtn = document.getElementById('previewBtn');
        const sendBtn = document.getElementById('sendBtn');
        const previewFrame = document.getElementById('previewFrame');
        const productCount = document.getElementById('productCount');
        const status = document.getElementById('status');
        
        // Modal
        const sendModal = document.getElementById('sendModal');
        const smtpPreset = document.getElementById('smtpPreset');
        const smtpHost = document.getElementById('smtpHost');
        const smtpPort = document.getElementById('smtpPort');
        const smtpUser = document.getElementById('smtpUser');
        const smtpPass = document.getElementById('smtpPass');
        const fromName = document.getElementById('fromName');
        const toEmail = document.getElementById('toEmail');
        
        // SMTP presets
        const presets = {
            gmail: { host: 'smtp.gmail.com', port: 587 },
            outlook: { host: 'smtp.office365.com', port: 587 },
            qq: { host: 'smtp.qq.com', port: 587 },
            163: { host: 'smtp.163.com', port: 587 }
        };
        
        // File selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                fileLabel.textContent = '已选择:';
                fileName.textContent = e.target.files[0].name;
                fileName.classList.add('text-green-600');
            }
        });
        
        // SMTP preset change
        smtpPreset.addEventListener('change', () => {
            const preset = presets[smtpPreset.value];
            smtpHost.value = preset.host;
            smtpPort.value = preset.port;
        });
        
        // Init preset
        smtpPreset.dispatchEvent(new Event('change'));
        
        // Show status
        function showStatus(message, isError = false) {
            status.textContent = message;
            status.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            status.classList.add(isError ? 'bg-red-100' : 'bg-green-100', isError ? 'text-red-800' : 'text-green-800');
            status.classList.remove('hidden');
        }
        
        // Generate Preview
        previewBtn.addEventListener('click', async () => {
            if (!fileInput.files[0]) {
                showStatus('请先上传 Excel 文件', true);
                return;
            }
            
            previewBtn.disabled = true;
            previewBtn.textContent = '处理中...';
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('hero_image', heroImage.value);
            formData.append('video_url', videoUrl.value);
            formData.append('greeting', greeting.value);
            
            try {
                const resp = await fetch('/api/preview', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await resp.json();
                
                if (data.success) {
                    sessionId = data.session_id;
                    productCount.textContent = `${data.product_count} 个产品`;
                    
                    // Display preview
                    const blob = new Blob([data.html], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    previewFrame.src = url;
                    
                    sendBtn.disabled = false;
                    showStatus(`✅ 生成成功! ${data.product_count} 个产品`);
                } else {
                    showStatus('错误: ' + data.error, true);
                }
            } catch (e) {
                showStatus('请求失败: ' + e.message, true);
            } finally {
                previewBtn.disabled = false;
                previewBtn.textContent = '✨ 生成预览';
            }
        });
        
        // Open send modal
        sendBtn.addEventListener('click', () => {
            sendModal.classList.remove('hidden');
            sendModal.classList.add('flex');
        });
        
        // Close modal
        document.getElementById('cancelSend').addEventListener('click', () => {
            sendModal.classList.add('hidden');
            sendModal.classList.remove('flex');
        });
        
        // Confirm send
        document.getElementById('confirmSend').addEventListener('click', async () => {
            const btn = document.getElementById('confirmSend');
            btn.disabled = true;
            btn.textContent = '发送中...';
            
            try {
                const resp = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        smtp_host: smtpHost.value,
                        smtp_port: parseInt(smtpPort.value),
                        smtp_user: smtpUser.value,
                        smtp_pass: smtpPass.value,
                        from_name: fromName.value || 'QuoteMailer',
                        to_email: toEmail.value
                    })
                });
                
                const data = await resp.json();
                
                if (data.success) {
                    showStatus('✅ 邮件发送成功!');
                    sendModal.classList.add('hidden');
                    sendModal.classList.remove('flex');
                } else {
                    showStatus('发送失败: ' + data.error, true);
                }
            } catch (e) {
                showStatus('请求失败: ' + e.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = '确认发送';
            }
        });
    </script>
</body>
</html>
