<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteMailer Web - 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        .sidebar { width: 280px; min-width: 280px; background: #1f2937; color: white; height: 100vh; overflow-y: auto; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }
        .project-item { padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; }
        .project-item:hover { background: #374151; }
        .project-item.active { background: #374151; border-left-color: #60a5fa; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; background: #f9fafb; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #9ca3af; }
        .upload-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-zone:hover { border-color: #2563eb; background: #eff6ff; }
    </style>
</head>
<body class="flex m-0 p-0">
    <!-- 左侧边栏 -->
    <aside class="sidebar flex flex-col">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold">QuoteMailer</h1>
            <p class="text-xs text-gray-400 mt-1">管理后台</p>
        </div>
        <div class="p-4 border-b border-gray-700">
            <div class="flex gap-2">
                <input type="text" id="newProjectName" placeholder="输入项目名称..." class="flex-1 px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm focus:outline-none focus:border-blue-500">
                <button onclick="createNewProject()" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded text-white text-sm font-medium">+ 新建</button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto" id="projectList">
            <div class="p-4 text-center text-gray-400">加载中...</div>
        </div>
        
        <!-- 全局测试发件箱配置 -->
        <div class="p-3 border-t border-gray-700 bg-gray-800">
            <p class="text-xs text-gray-400 mb-2">全局测试发件箱</p>
            
            <!-- SMTP 快捷预设 -->
            <div class="mb-2">
                <select id="globalSmtpPreset" onchange="applyGlobalSmtpPreset()" class="w-full px-2 py-1 rounded bg-gray-700 border border-gray-600 text-white text-xs">
                    <option value="">请选择快捷预设 / 自定义</option>
                    <option value="gmail">Gmail</option>
                    <option value="outlook">Outlook / Office365 / Hotmail</option>
                    <option value="yahoo">Yahoo</option>
                    <option value="icloud">Apple iCloud</option>
                    <option value="qq">QQ 邮箱</option>
                    <option value="163">网易 163 邮箱</option>
                    <option value="exmail_qq">企业微信 / 腾讯企业邮</option>
                    <option value="aliyun">阿里企业邮箱</option>
                </select>
            </div>
            
            <div class="space-y-2">
                <input type="email" id="globalSmtpUser" placeholder="发件邮箱" class="w-full px-2 py-1 rounded bg-gray-700 border border-gray-600 text-white text-xs">
                <div class="flex gap-1">
                    <div class="flex-1">
                        <input type="text" id="globalSmtpHost" placeholder="SMTP 服务器" class="w-full px-2 py-1 rounded bg-gray-700 border border-gray-600 text-white text-xs">
                    </div>
                    <div class="w-14">
                        <input type="number" id="globalSmtpPort" placeholder="端口" class="w-full px-2 py-1 rounded bg-gray-700 border border-gray-600 text-white text-xs">
                    </div>
                </div>
                <input type="password" id="globalSmtpPass" placeholder="授权码" class="w-full px-2 py-1 rounded bg-gray-700 border border-gray-600 text-white text-xs">
                <div class="flex gap-1">
                    <button onclick="saveGlobalSettings()" class="flex-1 px-2 py-1 bg-green-600 hover:bg-green-700 rounded text-white text-xs">保存</button>
                    <button onclick="testGlobalSettings()" class="px-2 py-1 bg-orange-600 hover:bg-orange-700 rounded text-white text-xs">测试</button>
                </div>
            </div>
        </div>
        
        <div class="p-3 border-t border-gray-700 text-xs text-gray-500">共 <span id="projectCount">0</span> 个项目</div>
    </aside>
    
    <!-- 右侧主内容区 -->
    <main class="main-content flex flex-col">
        <div class="empty-state" id="emptyState">
            <div class="text-6xl mb-4">📁</div>
            <h2 class="text-xl font-medium mb-2">请选择或创建项目</h2>
        </div>
        
        <div class="hidden flex-col h-full" id="projectDetail">
            <header class="bg-white border-b px-6 py-4">
                <h2 class="text-2xl font-bold text-gray-800" id="currentProjectName">项目名称</h2>
                <button onclick="renameProject()" class="ml-2 text-gray-500 hover:text-blue-600" title="修改名称">✏️</button>
                <p class="text-sm text-gray-500 mt-1"><span id="hasConfig">✓</span> 已配置 | <span id="hasQuote">✗</span> 未上传报价单</p>
            </header>
            <div class="flex-1 overflow-y-auto p-6">
                <div class="max-w-4xl mx-auto space-y-6">
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">1. 上传报价单 (Excel)</h3>
                        <div class="upload-zone">
                            <input type="file" id="quoteFile" accept=".xlsx,.xls" class="hidden" onchange="uploadQuote(this)">
                            <label for="quoteFile" class="cursor-pointer">
                                <div class="text-4xl mb-2">📊</div>
                                <p class="text-gray-600" id="uploadLabel">点击选择 Excel 文件</p>
                            </label>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">2. 项目配置</h3>
                        <div class="space-y-4">
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">主图链接</label><input type="url" id="heroImage" placeholder="https://..." class="w-full px-4 py-2 border border-gray-300 rounded-lg"></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">视频链接</label><input type="url" id="videoUrl" placeholder="https://youtube.com/..." class="w-full px-4 py-2 border border-gray-300 rounded-lg"></div>
                            
                            <!-- 图文氛围模块 -->
                            <div class="mt-4">
                                <label class="block text-sm font-medium text-gray-700 mb-2">附加图文模块 (Lifestyle & Features)</label>
                                <div id="extraModulesContainer" class="space-y-3"></div>
                                <button onclick="addExtraModule()" class="mt-2 text-sm text-blue-600 hover:text-blue-800">+ 添加图文模块</button>
                            </div>
                            
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">专属问候语</label><textarea id="greeting" rows="3" placeholder="Hi John,..." class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea></div>
                            
                            <!-- 模板选择 -->
                            <div class="mt-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">选择展示模板</label>
                                <select id="templateName" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                    <option value="tpl_nordic.html">Nordic Minimal</option>
                                    <option value="tpl_apple.html">Apple Cupertino</option>
                                    <option value="tpl_vogue.html">Vogue Editorial</option>
                                </select>
                            </div>
                            
                            <!-- 多图排版样式 (默认) -->
                            <div class="mt-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">多图排版样式 (默认)</label>
                                <select id="galleryStyle" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                    <option value="strip">横向条状缩略图 (Strip)</option>
                                    <option value="grid">网格缩略图 (Grid)</option>
                                    <option value="carousel">大图轮播 (Carousel)</option>
                                </select>
                                <p class="text-xs text-gray-500 mt-1">可在下方案件中为单个产品覆盖此设置</p>
                            </div>
                            
                            <!-- 单产品多图样式覆盖 -->
                            <div class="mt-4" id="perProductGallerySection" style="display:none;">
                                <label class="block text-sm font-medium text-gray-700 mb-2">单产品多图样式覆盖</label>
                                <div id="perProductGalleryList" class="space-y-2"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="saveConfig()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 py-3 rounded-lg">💾 保存配置</button>
                        <button id="previewBtn" onclick="generatePreview()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg">✨ 生成预览</button>
                    </div>
                    <div class="mt-3">
                        <button onclick="deleteProject()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg">🗑 删除项目</button>
                    </div>
                    <div id="status" class="hidden p-4 rounded-lg"></div>
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <div class="bg-gray-100 px-6 py-3 border-b"><h3 class="font-medium text-gray-800">预览效果</h3></div>
                        <iframe id="previewFrame" class="w-full h-[500px] border-0"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        let currentProject = null;
        let extraModules = [];
        
        // 添加图文模块
        function addExtraModule(moduleData = null) {
            const container = document.getElementById('extraModulesContainer');
            const index = extraModules.length;
            
            const div = document.createElement('div');
            div.className = 'p-3 border border-gray-200 rounded-lg bg-gray-50';
            div.dataset.index = index;
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-600">模块 ${index + 1}</span>
                    <button type="button" onclick="removeExtraModule(${index})" class="text-red-500 hover:text-red-700 text-sm">删除</button>
                </div>
                <input type="url" placeholder="图片链接 (Image URL)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2 module-image">
                <input type="text" placeholder="大标题 (Title - 可选)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2 module-title">
                <textarea placeholder="描述文字 (Description - 可选)" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded module-desc"></textarea>
            `;
            
            container.appendChild(div);
            extraModules.push({});
            
            // 如果有数据，回填
            if (moduleData) {
                div.querySelector('.module-image').value = moduleData.image || '';
                div.querySelector('.module-title').value = moduleData.title || '';
                div.querySelector('.module-desc').value = moduleData.desc || '';
            }
        }
        
        // 删除图文模块
        function removeExtraModule(index) {
            const container = document.getElementById('extraModulesContainer');
            const divs = container.querySelectorAll('[data-index]');
            if (divs[index]) {
                divs[index].remove();
                extraModules.splice(index, 1);
                // 重新编号
                container.querySelectorAll('[data-index]').forEach((div, i) => {
                    div.dataset.index = i;
                    div.querySelector('span').textContent = '模块 ' + (i + 1);
                    div.querySelector('button').setAttribute('onclick', 'removeExtraModule(' + i + ')');
                });
            }
        }
        
        // 收集动态模块数据
        function collectExtraModules() {
            const container = document.getElementById('extraModulesContainer');
            const modules = [];
            container.querySelectorAll('[data-index]').forEach(div => {
                const image = div.querySelector('.module-image').value.trim();
                const title = div.querySelector('.module-title').value.trim();
                const desc = div.querySelector('.module-desc').value.trim();
                if (image || title || desc) {
                    modules.push({ image, title, desc });
                }
            });
            return modules;
        }
        
        // 加载单产品多图样式覆盖
        function loadPerProductGalleryOverrides(overrides) {
            const container = document.getElementById('perProductGalleryList');
            container.innerHTML = '';
            for (const [productName, style] of Object.entries(overrides)) {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-2 p-2 bg-gray-50 rounded';
                div.innerHTML = `
                    <span class="flex-1 text-sm text-gray-700">${productName}</span>
                    <select class="px-2 py-1 border rounded text-sm per-gallery-override" data-product="${productName}">
                        <option value="strip" ${style=='strip'?'selected':''}>Strip</option>
                        <option value="grid" ${style=='grid'?'selected':''}>Grid</option>
                        <option value="carousel" ${style=='carousel'?'selected':''}>Carousel</option>
                    </select>
                `;
                container.appendChild(div);
            }
            document.getElementById('perProductGallerySection').style.display = 'block';
        }
        
        // 根据产品列表构建单产品多图样式选择UI
        function buildPerProductGalleryUI(products, existingOverrides) {
            const container = document.getElementById('perProductGalleryList');
            const section = document.getElementById('perProductGallerySection');
            container.innerHTML = '';
            
            // 只显示有多张图片的产品
            const multiImgProducts = products.filter(p => p.images && p.images.length > 1);
            
            if (multiImgProducts.length === 0) {
                section.style.display = 'none';
                return;
            }
            
            multiImgProducts.forEach(p => {
                const currentStyle = existingOverrides[p.name] || '';
                const div = document.createElement('div');
                div.className = 'flex items-center gap-2 p-2 bg-gray-50 rounded';
                div.innerHTML = `
                    <span class="flex-1 text-sm text-gray-700 truncate" title="${p.name}">${p.name}</span>
                    <select class="px-2 py-1 border rounded text-sm per-gallery-override" data-product="${p.name}">
                        <option value="">默认</option>
                        <option value="strip" ${currentStyle=='strip'?'selected':''}>Strip</option>
                        <option value="grid" ${currentStyle=='grid'?'selected':''}>Grid</option>
                        <option value="carousel" ${currentStyle=='carousel'?'selected':''}>Carousel</option>
                    </select>
                `;
                container.appendChild(div);
            });
            
            section.style.display = 'block';
        }
        
        // 收集单产品样式覆盖
        function collectGalleryOverrides() {
            const overrides = {};
            document.querySelectorAll('.per-gallery-override').forEach(sel => {
                overrides[sel.dataset.product] = sel.value;
            });
            return overrides;
        }
        
        // 页面加载时获取项目列表和全局设置
        window.onload = function() {
            console.log('[Admin] 页面加载完成');
            loadProjects();
            loadGlobalSettings();
        };
        
        // 加载全局设置
        function loadGlobalSettings() {
            fetch('/api/settings')
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.settings) {
                        document.getElementById('globalSmtpUser').value = data.settings.smtp_user || '';
                        document.getElementById('globalSmtpHost').value = data.settings.smtp_host || '';
                        document.getElementById('globalSmtpPort').value = data.settings.smtp_port || '';
                    }
                });
        }
        
        // 保存全局设置
        function saveGlobalSettings() {
            const smtp_user = document.getElementById('globalSmtpUser').value.trim();
            const smtp_pass = document.getElementById('globalSmtpPass').value;
            
            if (!smtp_user || !smtp_pass) {
                alert('请填写完整的发件邮箱和授权码');
                return;
            }
            
            const smtp_host = document.getElementById('globalSmtpHost').value.trim();
            const smtp_port = document.getElementById('globalSmtpPort').value.trim();
            
            fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ smtp_user, smtp_pass, smtp_host, smtp_port })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('全局发件箱配置已保存');
                    document.getElementById('globalSmtpPass').value = '';
                } else {
                    alert(data.error || '保存失败');
                }
            });
        }
        
        // ========== SMTP 快捷预设 (Admin) ==========
        const globalSmtpPresets = {
            'gmail': { host: 'smtp.gmail.com', port: 587 },
            'outlook': { host: 'smtp.office365.com', port: 587 },
            'yahoo': { host: 'smtp.mail.yahoo.com', port: 587 },
            'icloud': { host: 'smtp.mail.me.com', port: 587 },
            'qq': { host: 'smtp.qq.com', port: 465 },
            '163': { host: 'smtp.163.com', port: 465 },
            'exmail_qq': { host: 'smtp.exmail.qq.com', port: 465 },
            'aliyun': { host: 'smtp.qiye.aliyun.com', port: 465 }
        };
        
        // 域名自动检测映射表
        const globalDomainSmtpMap = {
            'qq.com': { host: 'smtp.qq.com', port: 465, platform: 'qq' },
            'foxmail.com': { host: 'smtp.qq.com', port: 465, platform: 'qq' },
            '163.com': { host: 'smtp.163.com', port: 465, platform: '163' },
            '126.com': { host: 'smtp.126.com', port: 465, platform: '163' },
            'gmail.com': { host: 'smtp.gmail.com', port: 587, platform: 'gmail' },
            'outlook.com': { host: 'smtp.office365.com', port: 587, platform: 'outlook' },
            'hotmail.com': { host: 'smtp.office365.com', port: 587, platform: 'outlook' },
            'live.com': { host: 'smtp.office365.com', port: 587, platform: 'outlook' },
            'yahoo.com': { host: 'smtp.mail.yahoo.com', port: 587, platform: 'yahoo' },
            'aliyun.com': { host: 'smtp.qiye.aliyun.com', port: 465, platform: 'aliyun' },
            'exmail.qq.com': { host: 'smtp.exmail.qq.com', port: 465, platform: 'exmail_qq' }
        };
        
        function applyGlobalSmtpPreset() {
            const preset = document.getElementById('globalSmtpPreset').value;
            const hostInput = document.getElementById('globalSmtpHost');
            const portInput = document.getElementById('globalSmtpPort');
            
            if (preset && globalSmtpPresets[preset]) {
                hostInput.value = globalSmtpPresets[preset].host;
                portInput.value = globalSmtpPresets[preset].port;
            } else if (preset === '') {
                hostInput.value = '';
                portInput.value = '';
            }
        }
        
        // 监听管理员邮箱输入，自动提取域名并填充 SMTP 配置
        function autoDetectGlobalSmtpFromEmail() {
            const email = document.getElementById('globalSmtpUser').value.trim().toLowerCase();
            const hostInput = document.getElementById('globalSmtpHost');
            const portInput = document.getElementById('globalSmtpPort');
            const presetSelect = document.getElementById('globalSmtpPreset');
            
            const atIndex = email.indexOf('@');
            if (atIndex === -1) return;
            
            const domain = email.substring(atIndex + 1);
            
            if (globalDomainSmtpMap[domain]) {
                const config = globalDomainSmtpMap[domain];
                hostInput.value = config.host;
                portInput.value = config.port;
                
                if (config.platform && presetSelect) {
                    presetSelect.value = config.platform;
                }
                console.log('[Admin SMTP] 自动识别: ' + domain + ' -> ' + config.host + ':' + config.port);
            }
        }
        
        // 页面加载完成后绑定管理员邮箱输入框事件
        document.addEventListener('DOMContentLoaded', function() {
            const emailInput = document.getElementById('globalSmtpUser');
            if (emailInput) {
                emailInput.addEventListener('blur', autoDetectGlobalSmtpFromEmail);
            }
        });
        
        // 测试全局设置
        function testGlobalSettings() {
            const email = prompt('请输入测试收件人邮箱:');
            if (!email) return;
            
            fetch('/api/settings/test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to_email: email })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('测试邮件发送成功！');
                } else {
                    alert('发送失败: ' + (data.error || '未知错误'));
                }
            });
        }
        
        function loadProjects() {
            console.log('[Admin] 加载项目列表...');
            const listContainer = document.getElementById('projectList');
            const countEl = document.getElementById('projectCount');
            
            fetch('/api/projects')
                .then(res => res.json())
                .then(data => {
                    console.log('[Admin] 项目数据:', data);
                    if (!data.success) {
                        listContainer.innerHTML = '<div class="p-4 text-center text-red-400">加载失败</div>';
                        return;
                    }
                    const projects = data.projects;
                    countEl.textContent = projects.length;
                    
                    if (projects.length === 0) {
                        listContainer.innerHTML = '<div class="p-4 text-center text-gray-500">暂无项目</div>';
                        return;
                    }
                    
                    listContainer.innerHTML = '';
                    projects.forEach(p => {
                        const div = document.createElement('div');
                        div.className = 'project-item';
                        div.dataset.name = p.name;
                        div.onclick = function() { loadProjectDetail(this.dataset.name); };
                        div.innerHTML = '<div class="font-medium">' + p.name + '</div><div class="text-xs text-gray-400 mt-1">' + (p.has_quote ? '✓ 已上传报价单' : '✗ 未上传报价单') + '</div>';
                        listContainer.appendChild(div);
                    });
                })
                .catch(err => {
                    console.error('[Admin] 加载失败:', err);
                    listContainer.innerHTML = '<div class="p-4 text-center text-red-400">加载错误</div>';
                });
        }
        
        function loadProjectDetail(name) {
            console.log('[Admin] 加载项目详情:', name);
            fetch('/api/projects/' + name)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        currentProject = data.project;
                        showProjectDetail(data.project);
                    }
                });
        }
        
        function showProjectDetail(project) {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('projectDetail').classList.remove('hidden');
            document.getElementById('projectDetail').classList.add('flex');
            
            document.getElementById('currentProjectName').textContent = project.name;
            
            // 正确显示配置状态
            document.getElementById('hasConfig').textContent = project.has_config ? '✓' : '✗';
            
            // 正确显示报价单状态 - 使用条件判断
            const quoteEl = document.getElementById('hasQuote');
            if (project.has_quote) {
                quoteEl.textContent = '✓ 已上传报价单';
                quoteEl.className = 'text-green-500';
            } else {
                quoteEl.textContent = '✗ 未上传报价单';
                quoteEl.className = 'text-red-500';
            }
            
            if (project.config) {
                document.getElementById('heroImage').value = project.config.hero_image || '';
                document.getElementById('videoUrl').value = project.config.video_url || '';
                document.getElementById('greeting').value = project.config.greeting || '';
                document.getElementById('templateName').value = project.config.template_name || 'tpl_nordic.html';
                
                // 加载图文模块
                document.getElementById('extraModulesContainer').innerHTML = '';
                extraModules = [];
                if (project.config.extra_modules && project.config.extra_modules.length > 0) {
                    project.config.extra_modules.forEach(m => addExtraModule(m));
                }
                
                // 加载多图排版样式
                document.getElementById('galleryStyle').value = project.config.gallery_style || 'strip';
                
                // 加载单产品样式覆盖列表
                if (project.has_quote) {
                    fetch('/api/preview', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ project_name: project.name })
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            buildPerProductGalleryUI(data.products || [], project.config.gallery_overrides || {});
                        }
                    });
                }
            }
            
            // 更新左侧选中状态
            document.querySelectorAll('.project-item').forEach(item => {
                item.classList.toggle('active', item.dataset.name === project.name);
            });
        }
        
        function createNewProject() {
            const name = document.getElementById('newProjectName').value.trim();
            if (!name) { alert('请输入项目名称'); return; }
            
            fetch('/api/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('newProjectName').value = '';
                    loadProjects();
                    loadProjectDetail(data.name);
                } else {
                    alert(data.error || '创建失败');
                }
            });
        }
        
        // 重命名项目
        function renameProject() {
            if (!currentProject) return;
            
            const newName = prompt('请输入新名称:', currentProject.name);
            if (!newName || newName === currentProject.name) return;
            
            fetch('/api/projects/' + currentProject.name + '/rename', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_name: newName })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('重命名成功');
                    loadProjects();
                    loadProjectDetail(newName);
                } else {
                    alert(data.error || '重命名失败');
                }
            });
        }
        
        // 删除项目
        function deleteProject() {
            if (!currentProject) return;
            
            if (!confirm('确定要永久删除项目 "' + currentProject.name + '" 吗？此操作不可恢复！')) {
                return;
            }
            
            if (!confirm('再次确认：删除后所有数据将被永久删除！')) {
                return;
            }
            
            fetch('/api/projects/' + currentProject.name, {
                method: 'DELETE'
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('项目已删除');
                    currentProject = null;
                    document.getElementById('projectDetail').classList.add('hidden');
                    document.getElementById('projectDetail').classList.remove('flex');
                    document.getElementById('emptyState').classList.remove('hidden');
                    loadProjects();
                } else {
                    alert(data.error || '删除失败');
                }
            })
            .catch(err => {
                alert('请求失败: ' + err.message);
            });
        }
        
        function uploadQuote(input) {
            if (!currentProject || !input.files[0]) return;
            
            const formData = new FormData();
            formData.append('file', input.files[0]);
            
            fetch('/api/projects/' + currentProject.name + '/quote', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showStatus('报价单上传成功');
                    loadProjects();
                    loadProjectDetail(currentProject.name);
                } else {
                    alert(data.error || '上传失败');
                }
            });
        }
        
        function saveConfig() {
            if (!currentProject) return;
            
            const config = {
                hero_image: document.getElementById('heroImage').value,
                video_url: document.getElementById('videoUrl').value,
                greeting: document.getElementById('greeting').value,
                template_name: document.getElementById('templateName').value,
                gallery_style: document.getElementById('galleryStyle').value,
                gallery_overrides: collectGalleryOverrides(),
                extra_modules: collectExtraModules()
            };
            
            fetch('/api/projects/' + currentProject.name, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ config })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showStatus('配置已保存');
                    loadProjects();
                } else {
                    alert(data.error || '保存失败');
                }
            });
        }
        
        function generatePreview() {
            if (!currentProject) return;
            
            document.getElementById('previewBtn').disabled = true;
            document.getElementById('previewBtn').textContent = '生成中...';
            
            // 直接用当前下拉框的值，不等保存
            const template_name = document.getElementById('templateName').value;
            const gallery_style = document.getElementById('galleryStyle').value;
            
            // 收集单产品覆盖
            const gallery_overrides = {};
            document.querySelectorAll('.per-gallery-override').forEach(sel => {
                if (sel.value) gallery_overrides[sel.dataset.product] = sel.value;
            });
            
            fetch('/api/preview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    project_name: currentProject.name,
                    custom_greeting: document.getElementById('greeting').value,
                    template_name: template_name,
                    gallery_style: gallery_style,
                    gallery_overrides: gallery_overrides
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('previewFrame').srcdoc = data.html;
                    showStatus('生成成功 ' + data.product_count + ' 个产品');
                } else {
                    alert(data.error || '生成失败');
                }
            })
            .catch(err => {
                alert('请求失败: ' + err.message);
            })
            .finally(() => {
                document.getElementById('previewBtn').disabled = false;
                document.getElementById('previewBtn').textContent = '✨ 生成预览';
            });
        }
        
        function showStatus(msg) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.classList.remove('hidden', 'bg-red-100', 'bg-green-100');
            el.classList.add('bg-green-100');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
